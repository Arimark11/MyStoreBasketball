{% extends 'base.html' %}

{% block title %}{% if form.instance.pk %}Редактировать новость{% else %}Создать новость{% endif %}{% endblock %}

{% block content %}
<h2>{% if form.instance.pk %}Редактировать новость{% else %}Создать новость{% endif %}</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
    <a href="{% url 'news_list' %}">Отмена</a>
</form>
{% endblock %}
