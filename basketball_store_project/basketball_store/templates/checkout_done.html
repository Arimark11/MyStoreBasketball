{% extends 'base.html' %}

{% block title %}Заказ оформлен{% endblock %}

{% block content %}
<h1>Спасибо за покупку!</h1>
<p>Ваш заказ №{{ order.id }} успешно создан.</p>
<p>Сумма: {{ order.total_amount }} руб.</p>
<p>Статус: {{ order.get_status_display }}</p>
<a href="{% url 'catalog' %}">Вернуться в каталог</a>
{% endblock %}
