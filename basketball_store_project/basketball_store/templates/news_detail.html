{% extends 'base.html' %}

{% block title %}{{ news_item.title }}{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">   <!-- центрирование -->
    <h1 style="text-align: center;">{{ news_item.title }}</h1>
    <p style="text-align: center;"><small>{{ news_item.created_at|date:"d/m/Y H:i" }}</small></p>
    {% if news_item.image %}
        <img src="{{ news_item.image.url }}" alt="{{ news_item.title }}" style="max-width: 300px; height: auto; display: block; margin: 0 auto 20px auto;">
    {% endif %}
    <div style="text-align: justify;">{{ news_item.full_text|linebreaks }}</div>
    <p style="text-align: center;"><a href="/news/">← Назад к новостям</a></p>
</div>
{% endblock %}
